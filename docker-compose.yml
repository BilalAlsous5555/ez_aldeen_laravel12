version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ez_aldeen-app
    container_name: ez_aldeen-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - /d/ez_aldeen:/var/www/html
    networks:
      - ez_aldeen-network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: ez_aldeen-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /d/ez_aldeen:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ez_aldeen-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ez_aldeen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ez_aldeen
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - ez_aldeen-network

networks:
  ez_aldeen-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
